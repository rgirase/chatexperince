<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#0d0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aura Roleplay</title>
    <style>
      #loading-fail-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #09090b;
        color: white;
        padding: 2rem;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .reset-btn {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
    <script>
      // Force clear problematic SWs before app loads
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            if (window.location.search.includes('reset=true')) {
              registration.unregister();
              console.log('SW Unregistered');
            }
          }
        });
      }

      // Diagnostic timer: If app hasn't mounted in 4 seconds, show recovery UI
      window.appLoadStartTime = Date.now();
      window.appIsMounted = false;
      setTimeout(() => {
        if (!window.appIsMounted) {
          document.getElementById('loading-fail-overlay').style.display = 'flex';
        }
      }, 4000);

      window.forceAppReset = () => {
        if (confirm("This will clear all local data and caches to fix the blank screen. Your chat history will be backed up if possible. Proceed?")) {
          // Backup chats to string just in case
          const backup = {};
          for(let i=0; i<localStorage.length; i++) {
             const key = localStorage.key(i);
             if(key.startsWith('chat_')) backup[key] = localStorage.getItem(key);
          }
          
          localStorage.clear();
          
          // Restore chats
          Object.entries(backup).forEach(([k, v]) => localStorage.setItem(k, v));
          
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
          }
          caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))));
          
          window.location.href = window.location.pathname + '?v=' + Date.now();
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-fail-overlay">
      <h2 style="color: #c084fc">App Loading Issue Detected</h2>
      <p style="color: #a1a1aa; max-width: 300px; margin: 0.5rem 0;">The application is taking too long to start. This is usually caused by outdated browser cache.</p>
      <button class="reset-btn" onclick="window.forceAppReset()">Fix & Start App</button>
      <p style="font-size: 0.7rem; color: #71717a; margin-top: 1rem;">This will clear cached files while preserved chat history.</p>
    </div>
    <script type="module" src="/src/main.jsx?v=2"></script>
  </body>
</html>
